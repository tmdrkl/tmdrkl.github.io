<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drkl.my.id</title>
<meta name="description" content="drkL — Void Linux, ricing, dan hal-hal terminal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #22262f;
    --surface: #2b303b;
    --surface-2: #333a47;
    --border: #3d4552;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #8fc7d9;
    --accent-2: #a3be8c;
    --prompt: #d9a76a;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(143,199,217,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(163,190,140,0.05), transparent 40%);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .window{
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  .titlebar{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .dot{
    width: 11px; height: 11px;
    border-radius: 50%;
  }
  .dot.red{ background: #bf616a; }
  .dot.yellow{ background: #ebcb8b; }
  .dot.green{ background: #a3be8c; }

  .titlebar-label{
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .term{
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    padding: 22px 24px 26px;
  }

  .line{
    white-space: pre-wrap;
    word-break: break-word;
  }

  .prompt{ color: var(--prompt); }
  .path{ color: var(--accent-2); }
  .cmd{ color: var(--text); }
  .comment{ color: var(--muted); }

  .who{
    margin: 14px 0 20px;
    padding-left: 2px;
  }
  .who .name{
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .who .tagline{
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .links{
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 6px;
  }

  .link{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    font-size: 13.5px;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }

  .link:hover, .link:focus-visible{
    border-color: var(--accent);
    background: rgba(143,199,217,0.06);
    transform: translateX(2px);
  }
  .link:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  .link .key{
    color: var(--accent);
    flex-shrink: 0;
  }
  .link .desc{
    margin-left: auto;
    color: var(--muted);
    font-size: 12px;
  }

  .cursor{
    display: inline-block;
    width: 8px;
    height: 15px;
    background: var(--accent);
    margin-left: 4px;
    vertical-align: text-bottom;
    animation: blink 1.1s steps(1) infinite;
  }

  @keyframes blink{
    0%, 49%{ opacity: 1; }
    50%, 100%{ opacity: 0; }
  }

  .footer{
    margin-top: 22px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  @media (prefers-reduced-motion: reduce){
    .cursor{ animation: none; opacity: 1; }
  }

  @media (max-width: 420px){
    .term{ padding: 18px 16px 20px; font-size: 13px; }
    .who .name{ font-size: 18px; }
  }
</style>
</head>
<body>

  <main class="window">
    <div class="titlebar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="titlebar-label">tomi@void ~ </span>
    </div>

    <div class="term">
      <div class="line"><span class="prompt">tomi@void</span><span class="path">:~$</span> <span class="cmd">whoami</span></div>

      <div class="who">
        <div class="name">drkl</div>
        <div class="tagline">Void Linux · Wayland ricing · dotfiles &amp; system internals</div>
      </div>

      <div class="line comment">$ ls links/</div>

      <nav class="links" aria-label="Tautan">
        <a class="link" href="https://github.com/tmdrkl" target="_blank" rel="noopener">
          <span class="key">→</span> GitHub <span class="desc">dotfiles &amp; proyek</span>
        </a>
        <a class="link" href="#" target="_blank" rel="noopener">
          <span class="key">→</span> Blog <span class="desc">catatan &amp; troubleshooting</span>
        </a>
        <a class="link" href="#" target="_blank" rel="noopener">
          <span class="key">→</span> Kontak <span class="desc">email</span>
        </a>
      </nav>

      <div class="line" style="margin-top: 18px;"><span class="prompt">tmdrkl@void</span><span class="path">:~$</span> <span class="cursor"></span></div>

      <div class="footer">
        <span>drkl.my.id</span>
        <span>niri · noctalia</span>
      </div>
    </div>
  </main>

</body>
</html>
